<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eseménykezelő</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <video autoplay muted loop id="Calendar">
        <source src="Calendar.mp4" type="video/mp4">
    </video>

    <div id="container">
        <div id="esemeny1"></div>
        <div id="esemeny2"></div>
        <div id="esemeny3"></div>
        <div id="esemeny4"></div>
        <div id="esemeny5"></div>
        <div id="esemeny6"></div>
        <div id="esemeny7"></div>
        <div id="esemeny8"></div>
    </div>


    <div id="hozzaadas" draggable="false" onclick="openMenu()">
        <h1>+</h1>
        <span class="popuptext" id="myPopup">Popup text...</span>
    </div>
    
</body>
<script>
    function openMenu(){
        document.getElementById("myPopup").visibility = "visible";
        let left = document.getElementById("myPopup").getBoundingClientRect().left;
        let top = document.getElementById("myPopup").getBoundingClientRect().top;
        let width = document.getElementsByTagName("html")[0].clientWidth/2;
        let height = document.getElementsByTagName("html")[0].clientHeight/2;
        document.getElementById("myPopup").style.transform += "translate(" + (width-left) + "," + (height-top) + ")"
    }
</script>
<script src="main.js"></script>
</html>
