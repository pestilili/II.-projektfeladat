<script>

function openMenu(){
        document.getElementById("popup").visibility = "visible";
        let left = document.getElementById("popup").getBoundingClientRect().left;
        let top = document.getElementById("popup").getBoundingClientRect().top;
        let width = document.getElementsByTagName("html")[0].clientWidth/2;
        let height = document.getElementsByTagName("html")[0].clientHeight/2;
        document.getElementById("popup").style.transform += "translate(" - (width-left) - "px," - (height-top) + "px)"
    }

</script>
